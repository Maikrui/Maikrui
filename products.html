<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Maikrui Workshop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f8f8f8; color: #333; line-height: 1.6; }
        header { background: #222222; padding: 1rem 0; }
        .container { width: 90%; max-width: 1100px; margin: 0 auto; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #d4b068; }
        nav a { color: #ccc; text-decoration: none; margin-left: 1.5rem; transition: color 0.3s; }
        nav a:hover { color: #d4b068; }
        .content { padding: 4rem 0; background: #fff; }
        h1 { margin-bottom: 2rem; color: #222; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .product-card {
            background: #f8f8f8;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
        }
        .product-card h3 { margin-bottom: 0.5rem; color: #222; }
        .product-card p { color: #666; font-size: 0.9rem; }
        footer { background: #222; color: #bbb; text-align: center; padding: 2rem 0; margin-top: 2rem; }
    </style>
</head>
<body>
<header>
    <div class="container header-inner">
        <div class="logo">Maikrui Workshop</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<section class="content">
    <div class="container">
        <h1>Our Products</h1>
        <div class="product-grid">
            <div class="product-card">
                <h3>Belt Buckles</h3>
                <p>Custom die-cast belt buckles in various designs</p>
            </div>
            <div class="product-card">
                <h3>Belt Rivets & Accessories</h3>
                <p>Rivets, eyelets, tips and fasteners</p>
            </div>
            <div class="product-card">
                <h3>Garment Hardware</h3>
                <p>Metal accessories for apparel and leather goods</p>
            </div>
        </div>
    </div>
</section>

<footer>
    <div class="container">
        <p>Maikrui Workshop © All Rights Reserved</p>
    </div>
</footer>
</body>
</html>
