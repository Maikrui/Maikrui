<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Maikruiworkshop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        header { background: #1a1a1a; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #d4af37; font-size: 1.5rem; font-weight: bold; }
        nav a { color: white; text-decoration: none; margin-left: 1.5rem; font-size: 1.1rem; }
        .container { max-width: 600px; margin: 3rem auto; padding: 0 2rem; }
        h1 { text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, textarea { width: 100%; padding: 1rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        .btn { background: #d4af37; color: black; padding: 1rem 2rem; border: none; border-radius: 4px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%; }
        .contact-info { margin-top: 3rem; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Maikruiworkshop</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="container">
        <h1>Get in Touch</h1>
        <form>
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject (e.g., Belt Buckle Custom Quote)</label>
                <input type="text" id="subject" name="subject">
            </div>
            <div class="form-group">
                <label for="message">Your Requirements (quantity, design, material, etc.)</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn">Send Inquiry</button>
        </form>

        <div class="contact-info">
            <h3>Contact Information</h3>
            <p>Email: wiki458413539@gmail.com</p>
            <p>WhatsApp: +86 15980009534</p>
            <p>Location: Quanzhou, Fujian, China</p>
        </div>
    </div>
</body>
</html>
