<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Maikrui Workshop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f8f8f8; color: #333; line-height: 1.6; }
        header { background: #222222; padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
        .container { width: 90%; max-width: 1100px; margin: 0 auto; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #d4b068; }
        nav a { color: #cccccc; text-decoration: none; margin-left: 1.5rem; transition: color 0.3s ease; }
        nav a:hover { color: #d4b068; }
        .content { padding: 4rem 0; background: #ffffff; }
        h1 { text-align: center; margin-bottom: 2rem; color: #222; }
        .form-wrapper { max-width: 600px; margin: 0 auto; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1.2rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: #d4b068;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background: #b89652;
        }
        .contact-info {
            text-align: center;
            margin-top: 2.5rem;
            padding: 1.5rem;
            background: #f8f8f8;
            border-radius: 8px;
            line-height: 2;
        }
        .contact-info h3 {
            margin-bottom: 0.8rem;
            color: #222;
        }
        .email-link {
            color: #d4b068;
            font-weight: bold;
            text-decoration: none;
            font-size: 17px;
        }
        footer { background: #222222; color: #bbbbbb; text-align: center; padding: 2rem 0; margin-top: 2rem; }
        @media (max-width: 768px) {
            nav a { margin-left: 0.8rem; }
        }
    </style>
</head>
<body>
<header>
    <div class="container header-inner">
        <div class="logo">Maikrui Workshop</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<section class="content">
    <div class="container">
        <h1>Get in Touch</h1>
        <div class="form-wrapper">
            <form action="https://formsubmit.co/wiki458413539@gmail.com" method="POST">
                <label>Your Name</label>
                <input type="text" name="name" required>

                <label>Your Email</label>
                <input type="email" name="email" required>

                <label>Subject</label>
                <input type="text" name="subject" required placeholder="Belt Buckle / Hardware Inquiry">

                <label>Your Requirements</label>
                <textarea name="message" rows="5" required placeholder="quantity, design, material, finishing..."></textarea>

                <button type="submit">Send Inquiry Now</button>
            </form>

            <div class="contact-info">
                <h3>Direct Contact</h3>
                <p>📩 Email: <a class="email-link" href="mailto:wiki458413539@gmail.com">Click to Send Email</a></p>
                <p>📱 WhatsApp: +86 15980009534</p>
                <p>📍 Location: Quanzhou, Fujian, China</p>
            </div>
        </div>
    </div>
</section>

<footer>
    <div class="container">
        <p>Maikrui Workshop © All Rights Reserved</p>
    </div>
</footer>
</body>
</html>
